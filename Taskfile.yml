version: '3'

vars:
  binary: pgr

tasks:
  default:
    desc: List all tasks
    cmds:
      - task --list

  deps:
    desc: Install dependencies (Rust toolchain and ripgrep)
    cmds:
      - winget install Rustlang.Rustup --accept-package-agreements --accept-source-agreements
      - winget install BurntSushi.ripgrep --accept-package-agreements --accept-source-agreements

  check:
    desc: Verify prerequisites (cargo and rg are on PATH)
    cmds:
      - cargo --version
      - rg --version

  build:
    desc: Compile release binary
    cmds:
      - cargo build --release

  install:
    desc: Install binary to cargo bin directory
    cmds:
      - cargo install --path .

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean
